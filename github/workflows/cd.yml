name: CD — Build & Push Images

on:
  workflow_run:
    workflows: ["CI — Tests"] 
    types:
      - completed
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY:       ghcr.io
  IMAGE_BACKEND:  ghcr.io/${{ github.repository_owner }}/aireviewhub-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/aireviewhub-frontend
  IMAGE_WIDGET:   ghcr.io/${{ github.repository_owner }}/aireviewhub-widget

jobs:

  # ── Vérification que les tests passent d'abord ────────────
  check-ci-result:
    name: Vérifier résultat CI
    runs-on: ubuntu-latest
    steps:
      - name: CI must be green
        if: ${{ github.event.workflow_run.conclusion != 'success' }}
        run: |
          echo "CI failed — aborting CD"
          exit 1

      - name: CI is green
        run: echo "CI passed — proceeding to build"

  # ── Build et Push Backend ─────────────────────────────────
  build-backend:
    name: Build Backend
    environment: staging
    runs-on: ubuntu-latest
    needs: check-ci-result
    deploy-production:
      environment: production # requiert approbation manuelle
      needs: [build-backend, build-frontend, run-migrations]
      steps:
        - name: Deploy to production
          run: |
            echo "Déploiement en production approuvé"
            # commandes de déploiement selon l'hébergeur choisi

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context:    ./backend
          dockerfile: ./backend/Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          target:     final
      
      - name: Scan image avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BACKEND }}:latest
          format:    table
          exit-code: '1'          # fail le job si vulnérabilité critique
          severity:  'CRITICAL,HIGH'
          ignore-unfixed: true    # ignore les CVEs sans fix disponible

  run-migrations:
    name: Migrations DB
    runs-on: ubuntu-latest
    needs: build-backend
    environment: production  # requiert approbation manuelle

    services:
      # Pas de DB ici — on se connecte à la prod via secrets
      # Les migrations sont appliquées par le backend au démarrage
      # via MigrateAsync() dans Program.cs — déjà en place 

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore
        run: dotnet restore
        working-directory: backend

      - name: Check pending migrations
        run: |
          dotnet ef migrations list \
            --project AiReviewHub.Infrastructure \
            --startup-project AiReviewHub.Api \
            --no-build 2>&1 | tail -5
        working-directory: backend
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.CONNECTION_STRING }}

      - name: Apply migrations
        run: |
          dotnet ef database update \
            --project AiReviewHub.Infrastructure \
            --startup-project AiReviewHub.Api
        working-directory: backend
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.CONNECTION_STRING }}

  # ── Build et Push Frontend ────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: check-ci-result
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context:    ./frontend
          dockerfile: ./frontend/Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          target:     runner
          build-args: |
            VITE_API_URL=${{ vars.API_URL }}

      - name: Scan image frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_FRONTEND }}:latest
          format:    table
          exit-code: '1'
          severity:  'CRITICAL,HIGH'
          ignore-unfixed: true
        

  # ── Build Widget ──────────────────────────────────────────
  build-widget:
    name: Build Widget
    runs-on: ubuntu-latest
    needs: check-ci-result

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: widget/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build
        working-directory: widget

      - name: Upload widget artifact
        uses: actions/upload-artifact@v4
        with:
          name: widget-dist-${{ github.sha }}
          path: widget/dist/
          retention-days: 30

  deploy-widget-cdn:
    name: Widget CDN (GitHub Pages)
    runs-on: ubuntu-latest
    needs: build-widget
    permissions:
      pages:    write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download widget artifact
        uses: actions/download-artifact@v4
        with:
          name: widget-dist-${{ github.sha }}
          path: ./widget-dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./widget-dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4


  # ── Résumé du déploiement ─────────────────────────────────
  deployment-summary:
    name: Résumé
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-widget]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | ${{ needs.build-backend.result }}  |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Widget   | ${{ needs.build-widget.result }}   |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Images disponibles sur:** ghcr.io/${{ github.repository_owner }}" >> $GITHUB_STEP_SUMMARY